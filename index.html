<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能商用冷藏展示柜</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f5f7fa;
      color: #222;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 50px;
      background: linear-gradient(135deg, #ffffff, #e9eef5);
    }

    .box {
      display: flex;
      gap: 50px;
      max-width: 1100px;
      align-items: center;
    }

    .text {
      flex: 1;
    }

    .text h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .text p {
      font-size: 20px;
      line-height: 1.8;
      color: #555;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 14px 28px;
      background: #111;
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-size: 18px;
    }

    .product {
      flex: 1;
      text-align: center;
    }

    .product img {
      width: 380px;
      max-width: 100%;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      transition: 0.4s;
    }

    .product img:hover {
      transform: scale(1.05);
    }

    .features {
      display: flex;
      justify-content: center;
      gap: 25px;
      padding: 60px 30px;
      background: white;
    }

    .card {
      width: 260px;
      padding: 30px;
      background: #f7f9fc;
      border-radius: 18px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .card h3 {
      font-size: 24px;
      margin-bottom: 12px;
    }

    .card p {
      color: #666;
      line-height: 1.6;
    }

    .footer {
      text-align: center;
      padding: 40px;
      background: #111;
      color: white;
    }
  </style>
</head>

<body>

  <section class="hero">
    <div class="box">
      <div class="text">
        <h1>金通达子母柜</h1>
        <p>
          专为餐饮门店打造。  
          集冷藏展示、储物、操作台于一体，让产品陈列更高级，门店形象更专业。
        </p>
        <a href="tel:18754306237">
    <button>立即咨询</button>
</a>
      </div>

      <div class="product">
        <img src="product.jpg" alt="金通达子母柜">
      </div>
    </div>
  </section>

  <section class="features">
    <div class="card">
      <h3>智能控温</h3>
      <p>稳定保持适合食品展示的温度，减少损耗，提升产品新鲜感。</p>
    </div>

    <div class="card">
      <h3>大容量展示</h3>
      <p>玻璃展示门搭配多层空间，适合食材陈列。</p>
    </div>

    <div class="card">
      <h3>商用级设计</h3>
      <p>不锈钢结构，耐用易清洁，适合高频率商业使用场景。</p>
    </div>
  </section>

  <div class="footer">
    © 2026 Commercial Kitchen Equipment | 专业商用厨具解决方案
  </div>

</body>
</html>
